name: Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release (default: v<package.json version>)"
        required: false
        type: string

jobs:
  package-chrome-firefox:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [chrome, firefox]
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install Packages
        run: npm install
      - name: Package
        run: npm run package-${{ matrix.platform }}
      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.platform }}
          path: mouse-dictionary-${{ matrix.platform }}-*.zip

  package-safari:
    runs-on: macos-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install xcrun
        run: sudo xcode-select -s /Library/Developer/CommandLineTools
      - name: Install Safari Web Extension Converter
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Install Packages
        run: npm install
      - name: Package
        run: npm run package-safari
      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: package-safari
          path: mouse-dictionary-safari-*.zip

  release:
    runs-on: ubuntu-latest
    needs: [package-chrome-firefox, package-safari]
    steps:
      - uses: actions/checkout@v5
      - name: Resolve tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="v${VERSION}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            dist/**/mouse-dictionary-*.zip
